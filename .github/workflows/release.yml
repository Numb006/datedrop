name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Datedrop ${{ github.ref_name }}'
          releaseBody: |
            Unsignierte Windows-Version von Datedrop.
            Beim ersten Start zeigt Windows SmartScreen eine Warnung
            ("Nicht erkannte App") an, da kein Code-Signing-Zertifikat
            verwendet wird. Über "Weitere Informationen" → "Trotzdem ausführen"
            starten.
          releaseDraft: false
          prerelease: false